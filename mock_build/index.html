<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Job Fit Analyzer Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.75.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.72.0/build/stlite.js"></script>
    
    <script>
      stlite.mount({
        requirements: ["pandas"],
        entrypoint: "mock_app.py",
        files: {
          "mock_app.py": {
            url: "mock_app.py",
          },
          "app.py": {
            url: "app.py",
          },
          "demo_data.json": {
            url: "demo_data.json",
          },
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
