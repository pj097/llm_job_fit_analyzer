name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.195.203.4
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: /opt/vectorfoundry/scripts/deploy-pathfinder.sh